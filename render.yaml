services:
  # Web Service
  - type: web
    name: erp-system
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python app.py"
    autoDeploy: true
    
    # Static file serving configuration
    staticPublish:
      # Serve static files from the static directory
      - url: /static
        dir: static
        
    # Environment variables
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: app.py

# Alternative approach if staticPublish doesn't work
# Use this in your app.py to serve static files manually:
"""
from flask import send_from_directory

@app.route('/static/<path:filename>')
def serve_static(filename):
    return send_from_directory('static', filename)
"""
