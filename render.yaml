services:
  # Web Service
  - type: web
    name: erp-system
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python app.py"
    autoDeploy: true
    
    # Environment variables
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: app.py

# Note: Render.com automatically serves static files from the 'static' directory
# So your local logo should work once deployed with render.yaml
