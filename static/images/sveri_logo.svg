<svg width="120" height="80" viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="120" height="80" fill="white" rx="8" stroke="#1e40af" stroke-width="2"/>
  
  <!-- Radiating sun rays -->
  <g transform="translate(60, 30)">
    <!-- Sun rays -->
    <g stroke="#1e40af" stroke-width="2" fill="none">
      <line x1="0" y1="-25" x2="0" y2="-20"/>
      <line x1="7" y1="-24" x2="5" y2="-19"/>
      <line x1="14" y1="-21" x2="10" y2="-17"/>
      <line x1="18" y1="-16" x2="14" y2="-12"/>
      <line x1="21" y1="-10" x2="17" y2="-7"/>
      <line x1="22" y1="-3" x2="18" y2="-2"/>
      <line x1="22" y1="3" x2="18" y2="2"/>
      <line x1="21" y1="10" x2="17" y2="7"/>
      <line x1="18" y1="16" x2="14" y2="12"/>
      <line x1="14" y1="21" x2="10" y2="17"/>
      <line x1="7" y1="24" x2="5" y2="19"/>
      <line x1="0" y1="25" x2="0" y2="20"/>
      <line x1="-7" y1="24" x2="-5" y2="19"/>
      <line x1="-14" y1="21" x2="-10" y2="17"/>
      <line x1="-18" y1="16" x2="-14" y2="12"/>
      <line x1="-21" y1="10" x2="-17" y2="7"/>
      <line x1="-22" y1="3" x2="-18" y2="2"/>
      <line x1="-22" y1="-3" x2="-18" y2="-2"/>
      <line x1="-21" y1="-10" x2="-17" y2="-7"/>
      <line x1="-18" y1="-16" x2="-14" y2="-12"/>
      <line x1="-14" y1="-21" x2="-10" y2="-17"/>
      <line x1="-7" y1="-24" x2="-5" y2="-19"/>
    </g>
    
    <!-- Central figures -->
    <g fill="#1e40af">
      <!-- Two figures representing education -->
      <circle cx="-8" cy="0" r="4"/>
      <rect x="-10" y="4" width="4" height="12"/>
      <circle cx="8" cy="0" r="4"/>
      <rect x="6" y="4" width="4" height="12"/>
    </g>
  </g>
  
  <!-- Text -->
  <text x="60" y="60" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e40af" text-anchor="middle">SVERI</text>
  <text x="60" y="72" font-family="Arial, sans-serif" font-size="8" fill="#1e40af" text-anchor="middle">Engineering for Excellence</text>
</svg>
